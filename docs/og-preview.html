<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
html, body {
    width: 1200px; height: 630px;
    margin: 0; padding: 0;
    background: #161620;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    position: relative;
}
body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(77,201,212,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77,201,212,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
}
body::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(77,201,212,0.1) 0%, transparent 50%);
}
.content {
    text-align: center;
    position: relative;
    z-index: 1;
}
.logo {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,232,239,0.35);
    margin-bottom: 24px;
}
.logo::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: #4dc9d4;
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
    box-shadow: 0 0 12px rgba(77,201,212,0.4);
}
h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 96px;
    font-weight: 700;
    color: #fff;
    margin: 0 0 12px 0;
    line-height: 1;
}
h1 span { color: #4dc9d4; }
.role {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #4dc9d4;
    letter-spacing: 0.08em;
    opacity: 0.7;
    margin-bottom: 16px;
}
.tagline {
    font-size: 14px;
    color: rgba(232,232,239,0.4);
}
</style>
</head>
<body>
<div class="content">
    <div class="logo">AI Mindset</div>
    <h1><span>/</span>apply</h1>
    <div class="role">ai native operator</div>
    <div class="tagline">последняя вакансия, на которую ты подашься</div>
</div>
</body>
</html>
