<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<style>
html, body {
    width: 1200px; height: 630px;
    margin: 0; padding: 0;
    background: #161620;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    position: relative;
}

/* Teal grid */
body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(77,201,212,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77,201,212,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
}

/* Center glow */
body::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 700px 500px at 50% 45%, rgba(77,201,212,0.12) 0%, transparent 70%);
    z-index: 0;
}

/* Noise texture */
.noise {
    position: absolute; inset: 0;
    z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
}

/* Vignette */
.vignette {
    position: absolute; inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10,10,18,0.6) 100%);
}

/* Corner accents */
.corner-tl, .corner-br {
    position: absolute;
    width: 80px; height: 80px;
    z-index: 2;
}
.corner-tl {
    top: 32px; left: 32px;
    border-top: 2px solid rgba(77,201,212,0.2);
    border-left: 2px solid rgba(77,201,212,0.2);
}
.corner-br {
    bottom: 32px; right: 32px;
    border-bottom: 2px solid rgba(77,201,212,0.2);
    border-right: 2px solid rgba(77,201,212,0.2);
}

.content {
    text-align: center;
    position: relative;
    z-index: 10;
    padding: 0 60px;
}

/* Logo row */
.logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
}

.logo-img {
    width: 36px;
    height: 36px;
    opacity: 0.6;
    filter: drop-shadow(0 0 8px rgba(77,201,212,0.3));
}

.logo-text {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(232,232,239,0.45);
}

/* Main heading */
h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 160px;
    font-weight: 800;
    color: #fff;
    margin: 0 0 20px 0;
    line-height: 0.95;
    letter-spacing: -3px;
    text-shadow: 0 0 60px rgba(77,201,212,0.15);
}
h1 .slash {
    color: #4dc9d4;
    text-shadow: 0 0 40px rgba(77,201,212,0.4);
}

/* Role */
.role {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #4dc9d4;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-shadow: 0 0 30px rgba(77,201,212,0.25);
}

/* Tagline */
.tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: rgba(232,232,239,0.5);
    letter-spacing: 0.02em;
}

/* Glow dots */
.dot {
    position: absolute;
    border-radius: 50%;
    z-index: 2;
}
.dot-1 {
    width: 6px; height: 6px;
    background: #4dc9d4;
    top: 40px; right: 40px;
    box-shadow: 0 0 16px 4px rgba(77,201,212,0.4);
}
.dot-2 {
    width: 4px; height: 4px;
    background: rgba(77,201,212,0.6);
    bottom: 40px; left: 40px;
    box-shadow: 0 0 12px 3px rgba(77,201,212,0.3);
}
.dot-3 {
    width: 3px; height: 3px;
    background: rgba(77,201,212,0.4);
    top: 120px; left: 100px;
    box-shadow: 0 0 10px 2px rgba(77,201,212,0.2);
}

/* Horizontal accent lines */
.line-left, .line-right {
    position: absolute;
    height: 1px;
    z-index: 2;
}
.line-left {
    width: 120px;
    left: 32px;
    top: 50%;
    background: linear-gradient(90deg, rgba(77,201,212,0.15), transparent);
}
.line-right {
    width: 120px;
    right: 32px;
    top: 50%;
    background: linear-gradient(-90deg, rgba(77,201,212,0.15), transparent);
}
</style>
</head>

<div class="dot dot-1"></div>
<div class="dot dot-2"></div>
<div class="dot dot-3"></div>
<div class="line-left"></div>
<div class="line-right"></div>
