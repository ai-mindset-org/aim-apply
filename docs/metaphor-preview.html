<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal as Portal — SVG Metaphor Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #161620;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            color: rgba(232,232,239,0.5);
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(77,201,212,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77,201,212,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 24px;
            color: rgba(232,232,239,0.3);
        }
        .svg-wrapper {
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(232,232,239,0.06);
            border-radius: 12px;
            padding: 32px;
            max-width: 700px;
        }
        .svg-wrapper svg {
            width: 100%;
            height: auto;
        }
        .caption {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(232,232,239,0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">aim-apply / terminal as portal</div>
        <div class="svg-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
              <defs>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="4" result="blur"/>
                  <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
                <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="8" result="blur"/>
                  <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
                <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#4dc9d4" stop-opacity="0.6"/>
                  <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
                </linearGradient>
                <linearGradient id="lineGradUp" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#4dc9d4" stop-opacity="0.5"/>
                  <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.25"/>
                </linearGradient>
                <linearGradient id="lineGradDown" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4dc9d4" stop-opacity="0.5"/>
                  <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.25"/>
                </linearGradient>
                <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#4dc9d4" stop-opacity="0.9"/>
                  <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.7"/>
                </radialGradient>
                <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#1a1a2e"/>
                  <stop offset="100%" stop-color="#161620"/>
                </linearGradient>
              </defs>

              <style>
                @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&amp;display=swap');
                .mono { font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace; }
                @keyframes pulse {
                  0%, 100% { opacity: 0.3; r: 22; }
                  50% { opacity: 0.6; r: 26; }
                }
                @keyframes pulseInner {
                  0%, 100% { opacity: 0.85; }
                  50% { opacity: 1; }
                }
                @keyframes cursorBlink {
                  0%, 49% { opacity: 1; }
                  50%, 100% { opacity: 0; }
                }
                @keyframes dashFlow {
                  to { stroke-dashoffset: -20; }
                }
                .node-glow { animation: pulse 3s ease-in-out infinite; }
                .node-glow-delay1 { animation-delay: 0.5s; }
                .node-glow-delay2 { animation-delay: 1.0s; }
                .node-glow-delay3 { animation-delay: 1.5s; }
                .node-inner { animation: pulseInner 3s ease-in-out infinite; }
                .node-inner-delay1 { animation-delay: 0.5s; }
                .node-inner-delay2 { animation-delay: 1.0s; }
                .node-inner-delay3 { animation-delay: 1.5s; }
                .cursor-blink { animation: cursorBlink 1.2s step-end infinite; }
                .flow-line { animation: dashFlow 2s linear infinite; }
              </style>

              <!-- Background -->
              <rect width="600" height="300" fill="#161620"/>

              <!-- Subtle grid -->
              <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
                <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(77,201,212,0.03)" stroke-width="0.5"/>
              </pattern>
              <rect width="600" height="300" fill="url(#grid)"/>

              <!-- Ambient glow behind terminal -->
              <ellipse cx="210" cy="150" rx="140" ry="100" fill="rgba(77,201,212,0.04)"/>

              <!-- ====== TERMINAL WINDOW ====== -->
              <rect x="60" y="50" width="280" height="200" rx="10" ry="10"
                    fill="#1a1a2e" stroke="rgba(232,232,239,0.1)" stroke-width="1"/>
              <rect x="60" y="50" width="280" height="28" rx="10" ry="10" fill="#1e1e32"/>
              <rect x="60" y="68" width="280" height="10" fill="#1e1e32"/>

              <!-- Traffic light dots -->
              <circle cx="80" cy="64" r="5" fill="#ff5f57"/>
              <circle cx="96" cy="64" r="5" fill="#febc2e"/>
              <circle cx="112" cy="64" r="5" fill="#28c840"/>

              <text x="200" y="67" text-anchor="middle" class="mono"
                    fill="rgba(232,232,239,0.4)" font-size="10" font-weight="300">aim-apply</text>

              <!-- Terminal screen -->
              <rect x="61" y="78" width="278" height="171" rx="0" ry="0" fill="url(#screenGrad)"/>

              <!-- Terminal content -->
              <text x="78" y="106" class="mono" fill="rgba(232,232,239,0.35)" font-size="12" font-weight="300">~</text>
              <text x="94" y="106" class="mono" fill="#4dc9d4" font-size="13" font-weight="400">$</text>
              <text x="108" y="106" class="mono" fill="rgba(232,232,239,0.75)" font-size="13" font-weight="400">claude</text>

              <text x="78" y="130" class="mono" fill="rgba(77,201,212,0.5)" font-size="12" font-weight="300">&gt;</text>
              <text x="94" y="130" class="mono" fill="rgba(232,232,239,0.6)" font-size="13" font-weight="400">/apply</text>

              <text x="78" y="154" class="mono" fill="rgba(232,232,239,0.3)" font-size="11" font-weight="300">scanning dimensions...</text>

              <text x="78" y="178" class="mono" fill="#4dc9d4" font-size="11" font-weight="400">4 dimensions found</text>

              <text x="78" y="202" class="mono" fill="rgba(232,232,239,0.35)" font-size="12" font-weight="300">~</text>
              <text x="94" y="202" class="mono" fill="#4dc9d4" font-size="13" font-weight="400">$</text>
              <rect x="108" y="192" width="8" height="14" fill="#4dc9d4" opacity="0.7" class="cursor-blink"/>

              <!-- ====== CONNECTION LINES ====== -->
              <path d="M 340 120 C 380 120, 410 75, 460 70"
                    fill="none" stroke="url(#lineGradUp)" stroke-width="1.5"
                    stroke-dasharray="6 4" class="flow-line"/>
              <path d="M 340 140 C 390 140, 420 125, 460 130"
                    fill="none" stroke="url(#lineGrad)" stroke-width="1.5"
                    stroke-dasharray="6 4" class="flow-line" style="animation-delay: 0.3s"/>
              <path d="M 340 160 C 390 160, 420 175, 460 185"
                    fill="none" stroke="url(#lineGrad)" stroke-width="1.5"
                    stroke-dasharray="6 4" class="flow-line" style="animation-delay: 0.6s"/>
              <path d="M 340 180 C 380 180, 410 225, 460 235"
                    fill="none" stroke="url(#lineGradDown)" stroke-width="1.5"
                    stroke-dasharray="6 4" class="flow-line" style="animation-delay: 0.9s"/>

              <!-- ====== NODES ====== -->

              <!-- Node T (Technical) -->
              <circle cx="490" cy="68" r="22" fill="rgba(77,201,212,0.08)" class="node-glow"/>
              <circle cx="490" cy="68" r="16" fill="none" stroke="#4dc9d4" stroke-width="1.2"
                      opacity="0.5" class="node-inner" filter="url(#glow)"/>
              <circle cx="490" cy="68" r="4" fill="#4dc9d4" opacity="0.9" class="node-inner"/>
              <text x="490" y="73" text-anchor="middle" class="mono"
                    fill="#4dc9d4" font-size="14" font-weight="500" opacity="0.95">T</text>
              <text x="490" y="100" text-anchor="middle" class="mono"
                    fill="rgba(232,232,239,0.35)" font-size="9" font-weight="300">technical</text>

              <!-- Node L (Thinking) -->
              <circle cx="500" cy="130" r="22" fill="rgba(59,130,246,0.08)" class="node-glow node-glow-delay1"/>
              <circle cx="500" cy="130" r="16" fill="none" stroke="#3b82f6" stroke-width="1.2"
                      opacity="0.5" class="node-inner node-inner-delay1" filter="url(#glow)"/>
              <circle cx="500" cy="130" r="4" fill="#3b82f6" opacity="0.9" class="node-inner node-inner-delay1"/>
              <text x="500" y="135" text-anchor="middle" class="mono"
                    fill="#3b82f6" font-size="14" font-weight="500" opacity="0.95">L</text>
              <text x="500" y="162" text-anchor="middle" class="mono"
                    fill="rgba(232,232,239,0.35)" font-size="9" font-weight="300">thinking</text>

              <!-- Node D (Taste) -->
              <circle cx="498" cy="188" r="22" fill="rgba(77,201,212,0.08)" class="node-glow node-glow-delay2"/>
              <circle cx="498" cy="188" r="16" fill="none" stroke="#4dc9d4" stroke-width="1.2"
                      opacity="0.5" class="node-inner node-inner-delay2" filter="url(#glow)"/>
              <circle cx="498" cy="188" r="4" fill="#4dc9d4" opacity="0.9" class="node-inner node-inner-delay2"/>
              <text x="498" y="193" text-anchor="middle" class="mono"
                    fill="#4dc9d4" font-size="14" font-weight="500" opacity="0.95">D</text>
              <text x="498" y="220" text-anchor="middle" class="mono"
                    fill="rgba(232,232,239,0.35)" font-size="9" font-weight="300">taste</text>

              <!-- Node I (Initiative) -->
              <circle cx="488" cy="238" r="22" fill="rgba(59,130,246,0.08)" class="node-glow node-glow-delay3"/>
              <circle cx="488" cy="238" r="16" fill="none" stroke="#3b82f6" stroke-width="1.2"
                      opacity="0.5" class="node-inner node-inner-delay3" filter="url(#glow)"/>
              <circle cx="488" cy="238" r="4" fill="#3b82f6" opacity="0.9" class="node-inner node-inner-delay3"/>
              <text x="488" y="243" text-anchor="middle" class="mono"
                    fill="#3b82f6" font-size="14" font-weight="500" opacity="0.95">I</text>
              <text x="488" y="270" text-anchor="middle" class="mono"
                    fill="rgba(232,232,239,0.35)" font-size="9" font-weight="300">initiative</text>

              <!-- Inter-node connections -->
              <line x1="490" y1="84" x2="500" y2="114" stroke="rgba(232,232,239,0.06)" stroke-width="0.8"/>
              <line x1="500" y1="146" x2="498" y2="172" stroke="rgba(232,232,239,0.06)" stroke-width="0.8"/>
              <line x1="498" y1="204" x2="488" y2="222" stroke="rgba(232,232,239,0.06)" stroke-width="0.8"/>
              <line x1="490" y1="84" x2="498" y2="172" stroke="rgba(232,232,239,0.03)" stroke-width="0.5"/>
              <line x1="500" y1="146" x2="488" y2="222" stroke="rgba(232,232,239,0.03)" stroke-width="0.5"/>
            </svg>
        </div>
        <div class="caption">600 x 300 &middot; inline SVG &middot; CSS animations only</div>
    </div>
</body>
</html>
