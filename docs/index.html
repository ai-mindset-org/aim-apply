<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/apply — AI Mindset</title>
    <meta property="og:title" content="/apply — AI Mindset">
    <meta property="og:description" content="последняя вакансия, на которую ты подашься">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #161620;
            --accent: #4dc9d4;
            --accent-glow: rgba(77,201,212,0.25);
            --text: #e8e8ef;
            --dim: rgba(232,232,239,0.4);
            --muted: rgba(232,232,239,0.25);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image:
                linear-gradient(rgba(77,201,212,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77,201,212,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        body::before {
            content:'';
            position:fixed; inset:0;
            background: radial-gradient(ellipse at 50% 40%, rgba(77,201,212,0.08) 0%, transparent 50%);
            pointer-events:none;
        }
        body::after {
            content:'';
            position:fixed; inset:0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events:none; z-index:9999;
        }

        .page {
            position:relative; z-index:1;
            text-align:center;
            padding: 0 24px;
            max-width: 520px;
        }

        .logo-img {
            width: 48px;
            height: 48px;
            margin-bottom: 32px;
            opacity: 0.9;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(52px, 12vw, 80px);
            font-weight: 700;
            line-height: 1;
            color: #fff;
            margin-bottom: 12px;
        }
        h1 span { color: var(--accent); }

        .role {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .tagline {
            font-size: 14px;
            color: var(--dim);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 40px;
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .cta:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 40px var(--accent-glow);
        }
        .cta .arr { transition: transform 0.25s; }
        .cta:hover .arr { transform: translateX(4px); }

        .how {
            margin-top: 32px;
            font-size: 12px;
            color: var(--muted);
            line-height: 2;
        }
        .how code {
            color: var(--dim);
            background: rgba(255,255,255,0.04);
            padding: 2px 6px;
        }

        .foot {
            margin-top: 40px;
            font-size: 11px;
            color: var(--muted);
        }
        .foot a { color: var(--accent); text-decoration:none; opacity:0.5; }
        .foot a:hover { opacity:1; }
    </style>
</head>
<body>
    <div class="page">
        <img src="logo.png" alt="AI Mindset" class="logo-img">

        <h1><span>/</span>apply</h1>

        <div class="role">AI Native Operator</div>

        <p class="tagline">последняя вакансия, на которую ты подашься</p>

        <a href="https://github.com/ai-mindset-org/aim-apply" class="cta">
            Apply <span class="arr">&rarr;</span>
        </a>

        <div class="how">
            <code>git clone</code> &middot; <code>claude</code> &middot; <code>submit</code>
        </div>

        <div class="foot">
            built by agents, for agents &middot; <a href="https://github.com/ai-mindset-org/aim-apply">github</a>
        </div>
    </div>
</body>
</html>
