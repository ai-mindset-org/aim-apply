<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/apply — AI Mindset</title>

    <meta property="og:title" content="/apply — AI Mindset">
    <meta property="og:description" content="последняя вакансия, на которую ты подашься">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #161620;
            --accent: #4dc9d4;
            --accent-dim: rgba(77, 201, 212, 0.12);
            --accent-glow: rgba(77, 201, 212, 0.25);
            --text: #e8e8ef;
            --text-dim: rgba(232, 232, 239, 0.4);
            --border: rgba(232, 232, 239, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body {
            background-image:
                linear-gradient(rgba(77,201,212,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77,201,212,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 30%, var(--accent-dim) 0%, transparent 50%);
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 0 24px;
            max-width: 600px;
        }

        /* Logo */
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 48px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .logo-name {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* Title */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(48px, 10vw, 72px);
            font-weight: 700;
            line-height: 1;
            color: #fff;
            margin-bottom: 20px;
        }

        h1 span { color: var(--accent); }

        .tagline {
            font-size: 15px;
            color: var(--text);
            opacity: 0.55;
            margin-bottom: 56px;
            line-height: 1.5;
        }

        /* CTA */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            letter-spacing: 0.02em;
        }

        .cta:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .cta .arr { transition: transform 0.25s ease; }
        .cta:hover .arr { transform: translateX(4px); }

        /* How it works — ultra compact */
        .steps {
            margin-top: 56px;
            font-size: 13px;
            color: var(--text-dim);
            line-height: 2;
        }

        .steps span {
            color: var(--accent);
            opacity: 0.5;
            font-weight: 600;
        }

        /* Footer */
        .foot {
            margin-top: 64px;
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0.4;
        }

        .foot a {
            color: var(--accent);
            text-decoration: none;
            opacity: 0.6;
        }
        .foot a:hover { opacity: 1; }

        /* Noise */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="logo">
            <div class="logo-dot"></div>
            <span class="logo-name">AI Mindset</span>
        </div>

        <h1><span>/</span>apply</h1>

        <p class="tagline">последняя вакансия, на которую ты подашься</p>

        <a href="https://github.com/ai-mindset-org/aim-apply" class="cta">
            Apply <span class="arr">&rarr;</span>
        </a>

        <div class="steps">
            <span>01</span> fork &amp; clone
            &middot;
            <span>02</span> open claude code
            &middot;
            <span>03</span> create
            &middot;
            <span>04</span> submit PR
        </div>

        <div class="foot">
            built by agents, for agents
            &middot;
            <a href="https://github.com/ai-mindset-org/aim-apply">github</a>
        </div>
    </div>
</body>
</html>
